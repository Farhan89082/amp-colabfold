<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AMP-ColabFold pipeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Stage 1 -->
  <rect x="100" y="30" width="480" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="62" text-anchor="middle" dominant-baseline="central">Stage 1 — Data curation</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="84" text-anchor="middle" dominant-baseline="central">DRAMP 4.0 · length + AA filter · 90% identity clustering</text>
  <rect x="264" y="108" width="152" height="26" rx="13" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#085041" x="340" y="121" text-anchor="middle" dominant-baseline="central">24,076 → 12,435 sequences</text>
  <line x1="340" y1="134" x2="340" y2="162" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Stage 2 -->
  <rect x="100" y="166" width="480" height="72" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" x="340" y="198" text-anchor="middle" dominant-baseline="central">Stage 2 — Feature engineering</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="340" y="220" text-anchor="middle" dominant-baseline="central">16 physicochemical features · charge · hydrophobic moment · Boman index</text>
  <rect x="264" y="244" width="152" height="26" rx="13" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#26215C" x="340" y="257" text-anchor="middle" dominant-baseline="central">0% missing · 12,435 sequences</text>
  <line x1="340" y1="270" x2="340" y2="298" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Stage 3 -->
  <rect x="100" y="302" width="480" height="72" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="340" y="334" text-anchor="middle" dominant-baseline="central">Stage 3 — Activity modelling</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="340" y="356" text-anchor="middle" dominant-baseline="central">Gradient boosting · ROC-AUC 0.77 · SHAP feature attribution</text>
  <rect x="180" y="380" width="320" height="32" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#4A1B0C" x="340" y="396" text-anchor="middle" dominant-baseline="central">Top features: length · fraction_helix · fraction_positive</text>
  <line x1="340" y1="412" x2="340" y2="444" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Stage 4 -->
  <rect x="100" y="448" width="480" height="72" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#412402" x="340" y="480" text-anchor="middle" dominant-baseline="central">Stage 4 — Candidate selection</text>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" x="340" y="502" text-anchor="middle" dominant-baseline="central">ab_proba ≥ 0.938 · low-complexity filter · 131 peptides selected</text>
  <line x1="340" y1="520" x2="340" y2="548" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Stage 5 -->
  <rect x="100" y="552" width="480" height="72" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53" x="340" y="584" text-anchor="middle" dominant-baseline="central">Stage 5 — Structure prediction</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" x="340" y="606" text-anchor="middle" dominant-baseline="central">ColabFold 1.6.1 · alphafold2_ptm · 3 recycles · pLDDT + PAE analysis</text>
  <rect x="222" y="630" width="236" height="26" rx="13" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#042C53" x="340" y="643" text-anchor="middle" dominant-baseline="central">131 folded · 69 high-confidence (pLDDT ≥ 70)</text>
  <line x1="340" y1="656" x2="340" y2="684" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Output -->
  <rect x="160" y="688" width="360" height="72" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#173404" x="340" y="720" text-anchor="middle" dominant-baseline="central">47 very high-confidence candidates</text>
  <text font-family="sans-serif" font-size="12" fill="#3B6D11" x="340" y="742" text-anchor="middle" dominant-baseline="central">pLDDT ≥ 90 · ab_proba ≥ 0.95 · top: AMP_02388 (pLDDT 97.3)</text>
</svg>
